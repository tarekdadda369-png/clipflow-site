<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ClipFlow Publisher — Login callback</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;max-width:720px;margin:60px auto;padding:0 20px;line-height:1.6;color:#222}
  h1{font-size:24px}
  .code{font-family:Consolas,monospace;font-size:15px;background:#f2f4ef;border:1px solid #d5d9cc;border-radius:8px;padding:14px;word-break:break-all;margin:14px 0}
  button{font:inherit;background:#2E6A5E;color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-weight:600}
  .ok{color:#3E7D4F;font-weight:600;display:none}
  .err{color:#AC3E32}
</style>
</head>
<body>
<h1>ClipFlow Publisher — login successful</h1>
<p id="msg">Copy the authorization code below and paste it back into the ClipFlow tool on your PC.</p>
<div class="code" id="code">…</div>
<button id="copy">Copy code</button> <span class="ok" id="ok">Copied ✓</span>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get("code"), err = p.get("error");
  const el = document.getElementById("code");
  if (code) { el.textContent = code; }
  else if (err) { el.textContent = err + ": " + (p.get("error_description") || ""); el.className = "code err"; document.getElementById("msg").textContent = "TikTok returned an error:"; }
  else { el.textContent = "No code in the URL — start the login from the ClipFlow tool."; }
  document.getElementById("copy").onclick = () => {
    navigator.clipboard.writeText(el.textContent).then(() => { document.getElementById("ok").style.display = "inline"; });
  };
</script>
</body>
</html>
